<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Galian</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-gray-100 text-gray-800" x-data="app()">

<!-- LANDING -->
<div x-show="page==='landing'" class="min-h-screen flex flex-col">

<section class="flex-1 flex flex-col items-center justify-center text-center px-6">
  <h1 class="text-5xl md:text-6xl font-extrabold text-blue-600 mb-4">🚀 Crypto Galian</h1>
  <p class="text-gray-600 mb-6 max-w-xl text-lg">
    Instantly sell Bitcoin, USDT, ETH, SOL & TRX and receive INR safely.
  </p>

  <button @click="page='dashboard'" class="bg-blue-600 text-white px-8 py-3 rounded-xl">
    Start Selling
  </button>
</section>

</div>

<!-- DASHBOARD -->
<div x-show="page==='dashboard'" class="flex min-h-screen">

<aside class="bg-white md:w-64 w-full fixed md:static bottom-0 left-0 right-0 border-t md:border-r">
<div class="hidden md:block p-5 space-y-4">
<h2 class="text-xl font-bold text-blue-600">🚀 Crypto Galian</h2>

<button @click="section='dashboard'" :class="tab('dashboard')">🏠 Dashboard</button>
<button @click="section='sell'" :class="tab('sell')">💰 Sell</button>
<button @click="section='transactions'" :class="tab('transactions')">📊 Transactions</button>
<button @click="section='withdraw'" :class="tab('withdraw')">💸 Withdraw</button>
<button @click="section='status'" :class="tab('status')">📄 Status</button>
<button @click="section='profile'" :class="tab('profile')">👤 Profile</button>

<button @click="logout()" class="text-red-500">Logout</button>
</div>
</aside>

<main class="flex-1 p-4">

<!-- DASHBOARD -->
<div x-if="section==='dashboard'">
<div class="grid grid-cols-3 gap-4">
  <div class="glass p-4 text-center">
    <p>USD</p>
    <p x-text="usd"></p>
  </div>
  <div class="glass p-4 text-center">
    <p>INR</p>
    <p x-text="inr"></p>
  </div>
  <div class="glass p-4 text-center">
    <p>Pending</p>
    <p x-text="pending"></p>
  </div>
</div>
</div>

<!-- SELL -->
<div x-if="section==='sell'" class="max-w-md space-y-3">
<select x-model="coin" class="w-full p-2 border">
<option value="usdt">USDT</option>
<option value="btc">BTC</option>
<option value="eth">ETH</option>
<option value="sol">SOL</option>
<option value="trx">TRX</option>
</select>

<input x-model.number="amount" type="number" placeholder="$500+" class="w-full p-2 border">

<p>INR: <span x-text="convertedINR"></span></p>

<button @click="submit()" class="bg-blue-600 text-white w-full py-2">
Submit
</button>
</div>

<!-- TRANSACTIONS -->
<div x-if="section==='transactions'">
<template x-for="(t,i) in txs" :key="t.id">
<div class="glass p-3 flex justify-between">
<span x-text="t.amount"></span>
<button @click="approveTx(i)">Approve</button>
</div>
</template>
</div>

<!-- WITHDRAW -->
<div x-if="section==='withdraw'" class="space-y-2">
<input x-model.number="withdrawAmt" placeholder="Amount">
<button @click="withdraw()" class="bg-green-600 text-white w-full">Withdraw</button>
</div>

</main>
</div>

<script src="app.js"></script>
</body>
</html>
